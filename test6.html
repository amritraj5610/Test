<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 6 Page</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f4f7fb, #dbeafe);
            color: #0f172a;
        }

        .card {
            width: min(90vw, 420px);
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin-top: 0;
        }

        code {
            background: #e2e8f0;
            padding: 0.15rem 0.4rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Test 6 Ready</h1>
        <p>This standalone page was created to verify that the repository can still accept new test files.</p>
        <p>Open <code>test6.html</code> in a browser to confirm the layout renders cleanly.</p>
    </main>
</body>
</html>
